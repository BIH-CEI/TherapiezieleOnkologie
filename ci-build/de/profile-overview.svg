<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Calibri, 'Segoe UI', Helvetica, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <marker id="arr-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arr-goal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c8102e"/>
    </marker>
    <symbol id="doc" viewBox="0 0 80 100">
      <path d="M 4 4 L 60 4 L 76 20 L 76 96 L 4 96 z" fill="#ffffff" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 60 4 L 60 20 L 76 20" fill="none" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#222">Therapieziele Onkologie — Profile und Verlauf</text>
  <line x1="380" y1="52" x2="820" y2="52" stroke="#c8102e" stroke-width="2"/>
  <text x="600" y="72" text-anchor="middle" font-size="12" fill="#555">CarePlan · Goal · EpisodeOfCare — BIH-CEI v0.1.0  ·  Schicht 3 (Fallback-Pfad)</text>

  <!-- LEFT DOMAIN PANEL: Zielarten -->
  <g transform="translate(36, 280)">
    <rect width="220" height="260" fill="#fdf3f5" stroke="#c8102e" stroke-width="2"/>
    <text x="110" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#c8102e" letter-spacing="1.5">ZIELART (category)</text>
    <line x1="14" y1="32" x2="206" y2="32" stroke="#c8102e" stroke-width="0.5"/>
    <g font-size="11" fill="#222">
      <rect x="14" y="46" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="60" y="64" text-anchor="middle" font-weight="600">Heilung</text>
      <text x="60" y="80" text-anchor="middle" font-size="10" fill="#555">curative</text>

      <rect x="114" y="46" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="160" y="62" text-anchor="middle" font-weight="600">Lebens-</text>
      <text x="160" y="76" text-anchor="middle" font-weight="600">verlängerung</text>

      <rect x="14" y="98" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="60" y="116" text-anchor="middle" font-weight="600">Symptom-</text>
      <text x="60" y="130" text-anchor="middle" font-weight="600">kontrolle</text>

      <rect x="114" y="98" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="160" y="116" text-anchor="middle" font-weight="600">Lebens-</text>
      <text x="160" y="130" text-anchor="middle" font-weight="600">qualität</text>

      <rect x="14" y="150" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="60" y="168" text-anchor="middle" font-weight="600">Funktions-</text>
      <text x="60" y="182" text-anchor="middle" font-weight="600">erhalt</text>

      <rect x="114" y="150" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="160" y="168" text-anchor="middle" font-weight="600">Studien-</text>
      <text x="160" y="182" text-anchor="middle" font-weight="600">teilnahme</text>
    </g>
    <text x="110" y="220" text-anchor="middle" font-size="10" fill="#5a4044" font-style="italic">Goal.category</text>
    <text x="110" y="236" text-anchor="middle" font-size="10" fill="#5a4044" font-style="italic">onko-therapy-goal-type</text>
  </g>

  <!-- RIGHT DOMAIN PANEL: Intentionen -->
  <g transform="translate(944, 280)">
    <rect width="220" height="260" fill="#fdf3f5" stroke="#c8102e" stroke-width="2"/>
    <text x="110" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#c8102e" letter-spacing="1.5">INTENTION (extension)</text>
    <line x1="14" y1="32" x2="206" y2="32" stroke="#c8102e" stroke-width="0.5"/>
    <g font-size="11" fill="#222">
      <rect x="14" y="46" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="60" y="72" text-anchor="middle" font-weight="600">kurativ</text>

      <rect x="114" y="46" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="160" y="72" text-anchor="middle" font-weight="600">neoadjuvant</text>

      <rect x="14" y="98" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="60" y="124" text-anchor="middle" font-weight="600">adjuvant</text>

      <rect x="114" y="98" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="160" y="124" text-anchor="middle" font-weight="600">Erhaltung</text>

      <rect x="14" y="150" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="60" y="176" text-anchor="middle" font-weight="600">palliativ</text>

      <rect x="114" y="150" width="92" height="44" fill="#ffffff" stroke="#222"/>
      <text x="160" y="176" text-anchor="middle" font-weight="600">supportiv</text>
    </g>
    <text x="110" y="220" text-anchor="middle" font-size="10" fill="#5a4044" font-style="italic">onko-therapy-intent</text>
    <text x="110" y="236" text-anchor="middle" font-size="10" fill="#5a4044" font-style="italic">CarePlan · Goal · EpisodeOfCare</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- CENTER WORKFLOW LANE  (y around 320, between panels) -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- Start -->
  <circle cx="305" cy="350" r="16" fill="#ffffff" stroke="#222" stroke-width="2"/>
  <text x="305" y="386" text-anchor="middle" font-size="10" fill="#555">Diagnose</text>
  <text x="305" y="398" text-anchor="middle" font-size="10" fill="#555">(Condition)</text>

  <!-- Process 1 -->
  <g transform="translate(360, 320)">
    <rect width="140" height="60" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" font-weight="600">Therapieziel</text>
    <text x="70" y="46" text-anchor="middle" font-weight="600">festlegen</text>
  </g>

  <!-- Process 2 -->
  <g transform="translate(540, 320)">
    <rect width="160" height="60" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="80" y="28" text-anchor="middle" font-weight="600">Behandlungs-</text>
    <text x="80" y="46" text-anchor="middle" font-weight="600">abschnitt anlegen</text>
  </g>

  <!-- Process 3 -->
  <g transform="translate(740, 320)">
    <rect width="140" height="60" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" font-weight="600">Versorgungsplan</text>
    <text x="70" y="46" text-anchor="middle" font-weight="600">erstellen</text>
  </g>

  <!-- Process 4: Verlauf -->
  <g transform="translate(540, 490)">
    <rect width="160" height="60" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="80" y="28" text-anchor="middle" font-weight="600">Verlauf</text>
    <text x="80" y="46" text-anchor="middle" font-weight="600">bewerten</text>
  </g>

  <!-- Decision diamond -->
  <g transform="translate(360, 490)">
    <polygon points="80,0 160,30 80,60 0,30" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="80" y="28" text-anchor="middle" font-weight="600">Ziel erreicht /</text>
    <text x="80" y="44" text-anchor="middle" font-weight="600">Linienwechsel?</text>
  </g>

  <!-- End -->
  <circle cx="305" cy="520" r="16" fill="#ffffff" stroke="#222" stroke-width="2"/>
  <circle cx="305" cy="520" r="11" fill="#ffffff" stroke="#222" stroke-width="2"/>
  <text x="305" y="554" text-anchor="middle" font-size="10" fill="#555">Ziel-Abschluss</text>

  <!-- Process flow arrows -->
  <line x1="321" y1="350" x2="358" y2="350" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="500" y1="350" x2="538" y2="350" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="700" y1="350" x2="738" y2="350" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Versorgungsplan → Verlauf (down + left) -->
  <path d="M 810 380 L 810 460 L 620 460 L 620 488" stroke="#222" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>

  <!-- Verlauf → Decision -->
  <line x1="540" y1="520" x2="522" y2="520" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Decision → End (Erreicht) -->
  <line x1="360" y1="520" x2="321" y2="520" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="343" y="512" text-anchor="middle" font-size="11" font-weight="600" fill="#222">Erreicht</text>

  <!-- Decision → Behandlungsabschnitt (Wechsel, loop back up) -->
  <path d="M 440 490 L 440 410 L 620 410 L 620 380" stroke="#222" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
  <text x="455" y="404" font-size="11" font-weight="600" fill="#222">Wechsel</text>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- DATA: FHIR Resources as document icons (above processes) -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- Goal above Therapieziel -->
  <g transform="translate(390, 158)">
    <use href="#doc" width="80" height="100"/>
    <text x="40" y="56" text-anchor="middle" font-size="11" font-weight="700">Goal</text>
    <text x="40" y="74" text-anchor="middle" font-size="9" fill="#555">OnkoTherapy-</text>
    <text x="40" y="86" text-anchor="middle" font-size="9" fill="#555">Goal</text>
  </g>
  <line x1="430" y1="260" x2="430" y2="318" stroke="#666" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr-data)"/>

  <!-- EpisodeOfCare above Behandlungsabschnitt -->
  <g transform="translate(580, 158)">
    <use href="#doc" width="80" height="100"/>
    <text x="40" y="46" text-anchor="middle" font-size="11" font-weight="700">EpisodeOf-</text>
    <text x="40" y="60" text-anchor="middle" font-size="11" font-weight="700">Care</text>
    <text x="40" y="78" text-anchor="middle" font-size="9" fill="#555">OnkoTherapy-</text>
    <text x="40" y="90" text-anchor="middle" font-size="9" fill="#555">Line</text>
  </g>
  <line x1="620" y1="260" x2="620" y2="318" stroke="#666" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr-data)"/>

  <!-- CarePlan above Versorgungsplan -->
  <g transform="translate(770, 158)">
    <use href="#doc" width="80" height="100"/>
    <text x="40" y="56" text-anchor="middle" font-size="11" font-weight="700">CarePlan</text>
    <text x="40" y="74" text-anchor="middle" font-size="9" fill="#555">OnkoCare-</text>
    <text x="40" y="86" text-anchor="middle" font-size="9" fill="#555">Plan</text>
  </g>
  <line x1="810" y1="260" x2="810" y2="318" stroke="#666" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr-data)"/>

  <!-- PlanDefinition above CarePlan-doc, slightly right -->
  <g transform="translate(880, 188)">
    <use href="#doc" width="60" height="72"/>
    <text x="30" y="36" text-anchor="middle" font-size="10" font-weight="700">PlanDef.</text>
    <text x="30" y="50" text-anchor="middle" font-size="9" fill="#555">CPG-on-FHIR</text>
    <text x="30" y="62" text-anchor="middle" font-size="9" fill="#555">(optional)</text>
  </g>
  <line x1="880" y1="220" x2="852" y2="220" stroke="#666" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr-data)"/>

  <!-- Observation below Verlauf bewerten -->
  <g transform="translate(580, 590)">
    <use href="#doc" width="80" height="80"/>
    <text x="40" y="40" text-anchor="middle" font-size="11" font-weight="700">Observation</text>
    <text x="40" y="56" text-anchor="middle" font-size="9" fill="#555">Outcome / Verlauf</text>
  </g>
  <line x1="620" y1="552" x2="620" y2="588" stroke="#666" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr-data)"/>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- GOAL ↔ OBSERVATION COUPLING -->
  <!-- Rectangular path in the right corridor (x=895, between processes ≤880
       and INTENTION panel ≥944), top horizontal at y=288 (above process boxes
       at 320, below doc icons at 258). Arrow ends pointing up into Goal-doc. -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <path d="M 660 612 L 895 612 L 895 288 L 430 288 L 430 262"
        fill="none" stroke="#c8102e" stroke-width="2.2" stroke-dasharray="5 3"
        marker-end="url(#arr-goal)" stroke-linejoin="round"/>

  <!-- Inline label: outcomeReference (on the vertical right segment) -->
  <rect x="852" y="438" width="86" height="36" fill="#ffffff"/>
  <text x="895" y="454" text-anchor="middle" font-size="11" font-weight="700" fill="#c8102e">outcome-</text>
  <text x="895" y="468" text-anchor="middle" font-size="11" font-weight="700" fill="#c8102e">Reference</text>

  <!-- Inline label: target.measure = Observation.code (on the top horizontal segment) -->
  <rect x="540" y="276" width="246" height="22" fill="#ffffff"/>
  <text x="663" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#c8102e">Goal.target.measure = Observation.code</text>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <g transform="translate(60, 690)">
    <text x="0" y="16" font-size="11" font-weight="700" fill="#222" letter-spacing="1">LEGENDE</text>

    <rect x="60" y="6" width="44" height="22" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="112" y="22" font-size="11" fill="#222">Prozess-Schritt</text>

    <g transform="translate(225, 0)">
      <use href="#doc" width="22" height="28"/>
    </g>
    <text x="255" y="22" font-size="11" fill="#222">FHIR-Ressource</text>

    <polygon points="370,18 392,6 414,18 392,30" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="424" y="22" font-size="11" fill="#222">Entscheidung</text>

    <rect x="530" y="6" width="28" height="22" fill="#fdf3f5" stroke="#c8102e" stroke-width="2"/>
    <text x="566" y="22" font-size="11" fill="#222">Wertebereich</text>

    <circle cx="675" y="18" cy="18" r="10" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="695" y="22" font-size="11" fill="#222">Start / Ende</text>

    <line x1="800" y1="18" x2="836" y2="18" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="844" y="22" font-size="11" fill="#222">Prozessfluss</text>

    <line x1="960" y1="18" x2="996" y2="18" stroke="#666" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr-data)"/>
    <text x="1004" y="22" font-size="11" fill="#222">Datenobjekt</text>
  </g>

  <!-- FHIR references footer -->
  <g transform="translate(60, 130)">
    <rect width="1080" height="22" fill="none" stroke="none"/>
    <text x="540" y="16" text-anchor="middle" font-size="11" fill="#555" font-style="italic">OnkoCarePlan.addresses → Condition  ·  .goal → OnkoTherapyGoal  ·  .encounter → Encounter.episodeOfCare → OnkoTherapyLine  ·  .instantiatesCanonical → PlanDefinition</text>
  </g>
</svg>
